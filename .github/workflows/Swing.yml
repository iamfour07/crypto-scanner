name: Master Swing Scanner

on:
  workflow_dispatch:

# Concurrency group ensures this waits if the Master Scanner is running
concurrency:
  group: scanner-lock
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run Scanner
        run: python EMARsiSwing.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN_Swing }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID_Swing }}

      - name: Commit Watchlist Updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Nayi files ko add karein jo script generate karti hai
          git add TopGainerWatchlist.json TopLoserWatchlist.json || true
          
          # Rebase taaki agar dusri script ne pehle push kiya ho to conflict na aaye
          git pull --rebase origin main
          
          git diff --cached --quiet || git commit -m "Update momentum watchlists [skip ci]"
          git push origin main
