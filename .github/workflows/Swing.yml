name: Master Swing Scanner

on:
  workflow_dispatch:

# Concurrency group ensures this waits if the Master Scanner is running
concurrency:
  group: scanner-lock
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run Scanner
        run: python momentum.py
        env:
          TELEGRAM_BOT_TOKEN_SWING: ${{ secrets.TELEGRAM_BOT_TOKEN_SWING }}
          TELEGRAM_CHAT_ID_SWING: ${{ secrets.TELEGRAM_CHAT_ID_SWING }}

      - name: Commit Watchlist Updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Sirf zaroori files add karein
          git add TopGainerWatchlist.json TopLoserWatchlist.json
          
          # Kisi bhi extra temporary file change ko discard karein
          git checkout -- . || true
          
          # Agar changes hain toh hi commit aur push karein
          if ! git diff --cached --quiet; then
            git commit -m "Update momentum watchlists [skip ci]"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to commit"
          fi
