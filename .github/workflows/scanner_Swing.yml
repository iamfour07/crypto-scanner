name: Master Reversal Scanner

on:
  workflow_dispatch:   # cronjob.org se trigger hoga

concurrency:
  group: scanner
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-trading-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run Master Scanner
        run: python NewBBReversal.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit Watchlist Updates
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add ReversalSellWatchlist.json
          git diff --cached --quiet || git commit -m "Update watchlist [skip ci]"
          git pull --rebase origin main
          git push origin main
