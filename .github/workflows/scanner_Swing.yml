name: Swing Scanner

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-new-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Important for pushing

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run New Scanner
        run: python TopMovers.py
        env:
          TELEGRAM_BOT_TOKEN_Swing: ${{ secrets.TELEGRAM_BOT_TOKEN_Swing }}
          TELEGRAM_CHAT_ID_Swing: ${{ secrets.TELEGRAM_CHAT_ID_Swing }}

      - name: Commit Watchlist Updates
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add PullBackBuy.json PullBackSell.json || true
          git diff --cached --quiet || git commit -m "Update watchlists [skip ci]"
          git push
