name: Master Strategy Scanner

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch:

concurrency:
  group: scanner
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-trading-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run Master Scanner
        run: python NewBBReversal.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit Watchlist Updates
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Latest repo lo
          git fetch origin main
          git reset --hard origin/main

          # Updated watchlist add karo
          git add ReversalSellWatchlist.json

          # Agar change hai tabhi commit
          git diff --cached --quiet || git commit -m "Update watchlist [skip ci]"

          git push origin main
