name: Master Strategy Scanner

on:
  schedule:
    - cron: "5 * * * *" # Har ghante ke 5th minute par chalega (Avoids congestion)
  workflow_dispatch: # Manual trigger button

permissions:
  contents: write

jobs:
  run-trading-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run Master Scanner
        run: python NewBBReversal.py
        env:
          TELEGRAM_BOT_TOKEN_Swing: ${{ secrets.TELEGRAM_BOT_TOKEN_Swing }}
          TELEGRAM_CHAT_ID_Swing: ${{ secrets.TELEGRAM_CHAT_ID_Swing }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit and Push Watchlist
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          
          # 1. Sabse pehle remote changes ko pull karein taaki hum up-to-date rahein
          git pull origin main --rebase --autostash
          
          # 2. Ab apni JSON files ko add karein
          git add ReversalSellWatchlist.json TrendPullbackBuy.json TrendPullbackSell.json || true
          
          # 3. Check karein ki kuch badla hai ya nahi, phir commit aur push
          if ! git diff --cached --quiet; then
            git commit -m "Automated Watchlist Update [skip ci]"
            git push origin main
          else
            echo "No changes in watchlists to commit."
          fi
