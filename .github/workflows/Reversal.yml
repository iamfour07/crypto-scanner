name: Master Reversal Scanner

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 * * * *' # Optional: Run every hour

concurrency:
  group: scanner-lock
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-trading-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip' # <--- This enables the cache

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run Master Scanner
        run: python NewBBReversal.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit Watchlist Updates
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          
          git add ReversalSellWatchlist.json || true
          
          # Only commit if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "Update reversal watchlist [skip ci]"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to watchlist."
          fi
