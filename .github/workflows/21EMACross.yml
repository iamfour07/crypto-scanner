name: Hourly Scanner

on:
  # schedule:
  #   - cron: '0,15,30,45 * * * *'  # every 15 minutes UTC

  workflow_dispatch:

permissions:
  contents: write   # required for pushing changes

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4 
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests

    - name: Run Scanner
      run: python NewBBReversal.py
      env:
        TELEGRAM_BOT_TOKEN_21_EMA: ${{ secrets.TELEGRAM_BOT_TOKEN_21_EMA }}
        TELEGRAM_CHAT_ID_21_EMA: ${{ secrets.TELEGRAM_CHAT_ID_21_EMA }}

    - name: Commit Watchlist Updates
      run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add ReversalBuyWatchlist.json ReversalSellWatchlist.json || true
          git diff --cached --quiet || git commit -m "Update watchlists [skip ci]"
          git push
